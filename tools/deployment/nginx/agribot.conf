server {
    listen 8080;
    server_name agribot.local localhost;

    # Dashboard Static Files
    location / {
        root /home/madhavan/agrobot_ws/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ROS Bridge WebSocket Reverse Proxy
    # Bug Fix #3: Correct WebSocket upgrade headers + idle timeout
    location /rosbridge/ {
        proxy_pass http://localhost:9090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;    # Keep long-lived WebSocket alive
        proxy_send_timeout 3600s;
    }

    # Web Video Stream Proxy (MJPEG is a continuous stream)
    location /stream/ {
        proxy_pass http://localhost:8081/;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;    # MJPEG never ends, don't time it out
    }
}
